<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Todo Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .archive-week {
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .archive-week:hover {
            background: #e9ecef;
            border-left-color: #667eea;
            transform: translateX(5px);
        }

        .archive-week-title {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .archive-week-date {
            font-size: 12px;
            color: #6c757d;
        }

        .archive-week-stats {
            font-size: 11px;
            color: #28a745;
            margin-top: 4px;
        }

        .main-content {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
        }

        .week-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .week-selector button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .week-selector button:hover {
            background: #5568d3;
        }

        .current-week {
            font-size: 14px;
            color: #6c757d;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 13px;
        }

        .task-input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .task-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .task-input-group input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .task-input-group input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .task-input-group input[type="text"]:first-child {
            flex: 2;
        }

        .add-task-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .add-task-btn:hover {
            background: #5568d3;
        }

        .tasks-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }

        .task-item:hover {
            background: #e9ecef;
            border-left-color: #667eea;
        }

        .task-item.completed {
            opacity: 0.7;
            background: #d4edda;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            margin-right: 15px;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task-text {
            font-size: 15px;
            color: #333;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #6c757d;
        }

        .task-link {
            font-size: 13px;
            color: #667eea;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .task-link:hover {
            text-decoration: underline;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .edit-btn {
            background: #ffc107;
            color: #333;
        }

        .edit-btn:hover {
            background: #e0a800;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #e9ecef;
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 13px;
            color: #6c757d;
            margin-top: 5px;
        }

        .archive-btn {
            margin-top: 20px;
            padding: 12px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            font-weight: 600;
        }

        .archive-btn:hover {
            background: #5a6268;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 300px;
            }

            .stats-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar Archive -->
        <div class="sidebar">
            <h2>📁 Archived Weeks</h2>
            <div id="archiveList"><div class="empty-state" style="font-size: 14px;">No archived weeks yet</div></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <div>
                    <h1>📝 Weekly Todo Tracker</h1>
                    <div class="current-week" id="currentWeek">Apr 28, 2026 - May 4, 2026</div>
                </div>
                <div class="week-selector">
                    <button onclick="newWeek()">New Week</button>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 33%;">33%</div>
            </div>

            <!-- Task Input -->
            <div class="task-input-section">
                <div class="task-input-group">
                    <input type="text" id="taskInput" placeholder="Enter task description...">
                    <input type="text" id="linkInput" placeholder="Optional: Add link URL...">
                    <button class="add-task-btn" onclick="addTask()">+ Add Task</button>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="tasks-container" id="tasksList">
                <div class="task-item ">
                    <input type="checkbox" class="task-checkbox" onchange="toggleTask(1777383257621)">
                    <div class="task-content">
                        <div class="task-text">Sign off from Lenny on betting hub</div>
                        
                            <a href="https://jturns530.github.io/PFL-Betting-Hub/" target="_blank" class="task-link">
                                🔗 jturns530.github.io
                            </a>
                        
                    </div>
                    <div class="task-actions">
                        <button class="edit-btn" onclick="editTask(1777383257621)">Edit</button>
                        <button class="delete-btn" onclick="deleteTask(1777383257621)">Delete</button>
                    </div>
                </div>
            
                <div class="task-item ">
                    <input type="checkbox" class="task-checkbox" onchange="toggleTask(1777383602956)">
                    <div class="task-content">
                        <div class="task-text">Winline approval</div>
                        
                            <a href="https://pflmma-my.sharepoint.com/:p:/r/personal/jturner_pflmma_com/_layouts/15/Doc.aspx?sourcedoc=%7B5B5DE5DC-07DC-48BE-B81E-78462C6640CF%7D&amp;file=Winline%20Terms%20Sheet%2026-28.pptx&amp;action=edit&amp;mobileredirect=true" target="_blank" class="task-link">
                                🔗 pflmma-my.sharepoint.com
                            </a>
                        
                    </div>
                    <div class="task-actions">
                        <button class="edit-btn" onclick="editTask(1777383602956)">Edit</button>
                        <button class="delete-btn" onclick="deleteTask(1777383602956)">Delete</button>
                    </div>
                </div>
            
                <div class="task-item completed">
                    <input type="checkbox" class="task-checkbox" checked="" onchange="toggleTask(1777391345258)">
                    <div class="task-content">
                        <div class="task-text">Bwin.tv social post ideas</div>
                        
                    </div>
                    <div class="task-actions">
                        <button class="edit-btn" onclick="editTask(1777391345258)">Edit</button>
                        <button class="delete-btn" onclick="deleteTask(1777391345258)">Delete</button>
                    </div>
                </div>
            </div>

            <!-- Statistics -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-value" id="totalTasks">3</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completedTasks">1</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="remainingTasks">2</div>
                    <div class="stat-label">Remaining</div>
                </div>
            </div>

            <!-- Archive Current Week Button -->
            <button class="archive-btn" onclick="archiveCurrentWeek()">📦 Archive This Week</button>
        </div>
    </div>

    <script>
        // Data structure
        let currentWeekData = {
            weekStart: new Date(),
            tasks: []
        };

        let archivedWeeks = [];

        // Load data from localStorage
        function loadData() {
            const savedCurrent = localStorage.getItem('currentWeek');
            const savedArchive = localStorage.getItem('archivedWeeks');
            
            if (savedCurrent) {
                currentWeekData = JSON.parse(savedCurrent);
                currentWeekData.weekStart = new Date(currentWeekData.weekStart);
            }
            
            if (savedArchive) {
                archivedWeeks = JSON.parse(savedArchive);
            }
            
            renderAll();
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('currentWeek', JSON.stringify(currentWeekData));
            localStorage.setItem('archivedWeeks', JSON.stringify(archivedWeeks));
        }

        // Get week date range
        function getWeekRange(date) {
            const start = new Date(date);
            const end = new Date(date);
            end.setDate(end.getDate() + 6);
            
            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            return `${start.toLocaleDateString('en-US', options)} - ${end.toLocaleDateString('en-US', options)}`;
        }

        // Add new task
        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const linkInput = document.getElementById('linkInput');
            
            const taskText = taskInput.value.trim();
            if (!taskText) return;
            
            const task = {
                id: Date.now(),
                text: taskText,
                link: linkInput.value.trim(),
                completed: false,
                createdAt: new Date()
            };
            
            currentWeekData.tasks.push(task);
            taskInput.value = '';
            linkInput.value = '';
            
            saveData();
            renderTasks();
            updateStats();
        }

        // Toggle task completion
        function toggleTask(taskId) {
            const task = currentWeekData.tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveData();
                renderTasks();
                updateStats();
            }
        }

        // Delete task
        function deleteTask(taskId) {
            if (confirm('Are you sure you want to delete this task?')) {
                currentWeekData.tasks = currentWeekData.tasks.filter(t => t.id !== taskId);
                saveData();
                renderTasks();
                updateStats();
            }
        }

        // Edit task
        function editTask(taskId) {
            const task = currentWeekData.tasks.find(t => t.id === taskId);
            if (!task) return;
            
            const newText = prompt('Edit task:', task.text);
            if (newText && newText.trim()) {
                task.text = newText.trim();
            }
            
            const newLink = prompt('Edit link (leave empty to remove):', task.link);
            task.link = newLink ? newLink.trim() : '';
            
            saveData();
            renderTasks();
        }

        // Render tasks
        function renderTasks() {
            const container = document.getElementById('tasksList');
            
            if (currentWeekData.tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">No tasks yet. Add your first task above!</div>';
                return;
            }
            
            container.innerHTML = currentWeekData.tasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        class="task-checkbox" 
                        ${task.completed ? 'checked' : ''} 
                        onchange="toggleTask(${task.id})"
                    />
                    <div class="task-content">
                        <div class="task-text">${task.text}</div>
                        ${task.link ? `
                            <a href="${task.link}" target="_blank" class="task-link">
                                🔗 ${new URL(task.link).hostname}
                            </a>
                        ` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="edit-btn" onclick="editTask(${task.id})">Edit</button>
                        <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Update statistics and progress
        function updateStats() {
            const total = currentWeekData.tasks.length;
            const completed = currentWeekData.tasks.filter(t => t.completed).length;
            const remaining = total - completed;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('remainingTasks').textContent = remaining;
            
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percentage + '%';
            progressBar.textContent = percentage + '%';
        }

        // Render archive
        function renderArchive() {
            const container = document.getElementById('archiveList');
            
            if (archivedWeeks.length === 0) {
                container.innerHTML = '<div class="empty-state" style="font-size: 14px;">No archived weeks yet</div>';
                return;
            }
            
            container.innerHTML = archivedWeeks
                .sort((a, b) => new Date(b.weekStart) - new Date(a.weekStart))
                .map((week, index) => {
                    const completed = week.tasks.filter(t => t.completed).length;
                    const total = week.tasks.length;
                    return `
                        <div class="archive-week" onclick="loadArchivedWeek(${index})">
                            <div class="archive-week-title">Week Archive</div>
                            <div class="archive-week-date">${getWeekRange(new Date(week.weekStart))}</div>
                            <div class="archive-week-stats">${completed}/${total} tasks completed</div>
                        </div>
                    `;
                }).join('');
        }

        // Load archived week
        function loadArchivedWeek(index) {
            const week = archivedWeeks[index];
            if (confirm('Load this archived week? Current week will be saved.')) {
                // Archive current week if it has tasks
                if (currentWeekData.tasks.length > 0) {
                    archivedWeeks.push({...currentWeekData});
                }
                
                // Load archived week
                currentWeekData = {
                    weekStart: new Date(week.weekStart),
                    tasks: [...week.tasks]
                };
                
                // Remove from archive
                archivedWeeks.splice(index, 1);
                
                saveData();
                renderAll();
            }
        }

        // Archive current week
        function archiveCurrentWeek() {
            if (currentWeekData.tasks.length === 0) {
                alert('No tasks to archive!');
                return;
            }
            
            if (confirm('Archive this week and start fresh?')) {
                archivedWeeks.push({...currentWeekData});
                currentWeekData = {
                    weekStart: new Date(),
                    tasks: []
                };
                
                saveData();
                renderAll();
            }
        }

        // Start new week
        function newWeek() {
            if (currentWeekData.tasks.length > 0) {
                if (confirm('Start a new week? Current tasks will be archived.')) {
                    archivedWeeks.push({...currentWeekData});
                    currentWeekData = {
                        weekStart: new Date(),
                        tasks: []
                    };
                    
                    saveData();
                    renderAll();
                }
            } else {
                currentWeekData.weekStart = new Date();
                saveData();
                renderAll();
            }
        }

        // Render everything
        function renderAll() {
            document.getElementById('currentWeek').textContent = getWeekRange(currentWeekData.weekStart);
            renderTasks();
            updateStats();
            renderArchive();
        }

        // Enter key to add task
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            document.getElementById('taskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
            
            document.getElementById('linkInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
        });
    </script>

</body></html>
